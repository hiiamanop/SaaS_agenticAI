# docker-compose.yml
name: erp

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:

  # ============================================================
  # DATABASES
  # ============================================================

  postgres:
    image: postgres:16-alpine
    container_name: erp_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-erp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-erp_dev_password}
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-erp}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - erp_network
    restart: unless-stopped
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: erp_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_dev_password}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_dev_password}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - erp_network
    restart: unless-stopped
    logging: *default-logging

  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: erp_qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - erp_network
    restart: unless-stopped
    logging: *default-logging

  # ============================================================
  # EVENT STREAMING
  # ============================================================

  redpanda:
    image: redpandadata/redpanda:v24.1.1
    container_name: erp_redpanda
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --smp 1
      - --memory 512M
      - --overprovisioned
      - --default-log-level=warn
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    ports:
      - "19092:19092"
      - "18081:18081"
      - "18082:18082"
      - "9644:9644"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 12
    networks:
      - erp_network
    restart: unless-stopped
    logging: *default-logging

  redpanda-console:
    image: redpandadata/console:v2.6.0
    container_name: erp_redpanda_console
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
    volumes:
      - ./infra/redpanda/console-config.yml:/tmp/config.yml:ro
    networks:
      - erp_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.redpanda.rule=Host(`redpanda.localhost`)"
      - "traefik.http.services.redpanda.loadbalancer.server.port=8080"
    logging: *default-logging

  # ============================================================
  # API GATEWAY
  # ============================================================

  traefik:
    image: traefik:v3.0
    container_name: erp_traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=erp_network"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--entrypoints.web.address=:80"
      - "--log.level=INFO"
      - "--accesslog=false"
    ports:
      - "80:80"
      - "8090:8080"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./infra/traefik/dynamic:/etc/traefik/dynamic:ro"
    networks:
      - erp_network
    restart: unless-stopped
    logging: *default-logging

  # ============================================================
  # OBSERVABILITY
  # ============================================================

  loki:
    image: grafana/loki:3.0.0
    container_name: erp_loki
    command: -config.file=/etc/loki/config.yml
    volumes:
      - ./infra/loki/config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - erp_network
    restart: unless-stopped
    logging: *default-logging

  tempo:
    image: grafana/tempo:2.4.2
    container_name: erp_tempo
    command: ["-config.file=/etc/tempo.yml"]
    volumes:
      - ./infra/tempo/tempo.yml:/etc/tempo.yml:ro
      - tempo_data:/tmp/tempo
    ports:
      - "3200:3200"
    networks:
      - erp_network
    restart: unless-stopped
    logging: *default-logging

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: erp_prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - erp_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prometheus.rule=Host(`prometheus.localhost`)"
      - "traefik.http.services.prometheus.loadbalancer.server.port=9090"
    restart: unless-stopped
    logging: *default-logging

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.101.0
    container_name: erp_otel_collector
    command: ["--config=/etc/otel/config.yml"]
    volumes:
      - ./infra/otel/otel-collector.yml:/etc/otel/config.yml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - erp_network
    restart: unless-stopped
    logging: *default-logging

  grafana:
    image: grafana/grafana:10.4.2
    container_name: erp_grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - erp_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.localhost`)"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    restart: unless-stopped
    logging: *default-logging

  # ============================================================
  # SECRET MANAGEMENT
  # ============================================================

  vault:
    image: hashicorp/vault:1.16
    container_name: erp_vault
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_TOKEN:-dev-root-token}
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_LOG_LEVEL: warn
    cap_add:
      - IPC_LOCK
    volumes:
      - vault_data:/vault/data
      - ./infra/vault/dev-policy.hcl:/vault/config/dev-policy.hcl:ro
    ports:
      - "8200:8200"
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - erp_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vault.rule=Host(`vault.localhost`)"
      - "traefik.http.services.vault.loadbalancer.server.port=8200"
    restart: unless-stopped
    logging: *default-logging

  # ============================================================
  # IDENTITY & AUTHORIZATION
  # ============================================================

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: erp_keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak_db
      KC_DB_USERNAME: ${POSTGRES_USER:-erp}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-erp_dev_password}
      KC_HOSTNAME: keycloak.localhost
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    command:
      - start-dev
      - --import-realm
    volumes:
      - ./infra/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
      - keycloak_data:/opt/keycloak/data
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    networks:
      - erp_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.keycloak.rule=Host(`keycloak.localhost`)"
      - "traefik.http.services.keycloak.loadbalancer.server.port=8080"
    restart: unless-stopped
    logging: *default-logging

  opa:
    image: openpolicyagent/opa:0.68.0
    container_name: erp_opa
    command:
      - run
      - --server
      - --addr=0.0.0.0:8181
      - --log-level=error
      - /policies
    volumes:
      - ./infra/opa/policies:/policies:ro
    ports:
      - "8181:8181"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8181/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - erp_network
    restart: unless-stopped
    logging: *default-logging

# ============================================================
# VOLUMES & NETWORKS
# ============================================================

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  redpanda_data:
  prometheus_data:
  grafana_data:
  loki_data:
  tempo_data:
  vault_data:
  keycloak_data:

networks:
  erp_network:
    driver: bridge
    name: erp_network
